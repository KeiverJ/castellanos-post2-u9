<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Lista de Estudiantes</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 8px 12px;
        text-align: left;
      }
      th {
        background: #065a82;
        color: white;
      }
      tr:nth-child(even) {
        background: #f5f5f5;
      }
      .btn {
        padding: 6px 12px;
        text-decoration: none;
        border-radius: 4px;
      }
      .btn-edit {
        background: #1c7293;
        color: white;
      }
      .btn-del {
        background: #c62828;
        color: white;
      }
      .btn-new {
        background: #2e7d32;
        color: white;
        margin-bottom: 1rem;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h1>Lista de Estudiantes</h1>
    <a th:href="@{/estudiantes/nuevo}" class="btn btn-new"
      >+ Nuevo Estudiante</a
    >

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Correo</th>
          <th>Carrera</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="e : ${estudiantes}">
          <td th:text="${e.nombre}"></td>
          <td th:text="${e.apellido}"></td>
          <td th:text="${e.correo}"></td>
          <td th:text="${e.carrera}"></td>
          <td>
            <a
              th:href="@{/estudiantes/editar/{id}(id=${e.id})}"
              class="btn btn-edit"
              >Editar</a
            >
            <a
              th:href="@{/estudiantes/eliminar/{id}(id=${e.id})}"
              class="btn btn-del"
              >Eliminar</a
            >
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(estudiantes)}">
          <td colspan="5" style="text-align: center">
            No hay estudiantes registrados.
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
