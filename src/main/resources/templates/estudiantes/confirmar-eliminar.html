<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Confirmar Eliminación</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
      }
      .card {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 2rem;
        max-width: 500px;
      }
      .btn-danger {
        padding: 8px 16px;
        background: #c62828;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-cancel {
        padding: 8px 16px;
        background: #808080;
        color: white;
        text-decoration: none;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Confirmar Eliminación</h1>

    <div class="card">
      <p>¿Está seguro de que desea eliminar al siguiente estudiante?</p>
      <ul>
        <li>
          <strong>Nombre:</strong> <span th:text="${estudiante.nombre}"></span>
          <span th:text="${estudiante.apellido}"></span>
        </li>
        <li>
          <strong>Correo:</strong> <span th:text="${estudiante.correo}"></span>
        </li>
        <li>
          <strong>Carrera:</strong>
          <span th:text="${estudiante.carrera}"></span>
        </li>
      </ul>

      <form
        th:action="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}"
        method="post"
      >
        <button type="submit" class="btn-danger">Sí, eliminar</button>
        <a th:href="@{/estudiantes}" class="btn-cancel">Cancelar</a>
      </form>
    </div>
  </body>
</html>
