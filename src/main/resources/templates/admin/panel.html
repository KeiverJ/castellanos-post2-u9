<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administracion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px 12px;
            text-align: left;
        }
        th {
            background: #065a82;
            color: white;
        }
        tr:nth-child(even) {
            background: #f5f5f5;
        }
        .btn {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-back {
            background: #1c7293;
            color: white;
        }
        .btn-logout {
            background: #c62828;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Panel de Administracion</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Activo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.rol}"></td>
                <td th:text="${u.activo} ? 'Si' : 'No'"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(usuarios)}">
                <td colspan="5" style="text-align: center">
                    No hay usuarios registrados.
                </td>
            </tr>
        </tbody>
    </table>
    <br/>
    <a th:href="@{/dashboard}" class="btn btn-back">Volver al Dashboard</a>
    <form th:action="@{/logout}" method="post" style="display: inline; margin-left: 1rem;">
        <button type="submit" class="btn btn-logout">Cerrar Sesion</button>
    </form>
</body>
</html>
