<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }
        .form-container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-primary {
            background: #065a82;
            color: white;
            width: 100%;
        }
        .alert {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }
        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
        .link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #065a82;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Iniciar Sesion</h1>
        <div th:if="${param.error}" class="alert alert-error">
            Correo o contrasenia incorrectos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Sesion cerrada correctamente.
        </div>
        <div th:if="${param.registrado}" class="alert alert-success">
            Registro exitoso. Inicie sesion.
        </div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Correo:</label>
                <input type="email" id="username" name="username" required />
            </div>
            <div class="form-group">
                <label for="password">Contrasenia:</label>
                <input type="password" id="password" name="password" required />
            </div>
            <button type="submit" class="btn btn-primary">Ingresar</button>
        </form>
        <a th:href="@{/registro}" class="link">No tiene cuenta? Registrarse</a>
    </div>
</body>
</html>
