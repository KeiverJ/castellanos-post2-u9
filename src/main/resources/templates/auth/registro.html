<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }
        .form-container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-primary {
            background: #065a82;
            color: white;
            width: 100%;
        }
        .btn-new {
            background: #2e7d32;
            color: white;
        }
        .alert-error {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 1rem;
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }
        .error-msg {
            color: #c62828;
            font-size: 0.85rem;
        }
        .link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #065a82;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Registro de Usuario</h1>
        <form th:action="@{/registro}" th:object="${usuario}" method="post">
            <div th:if="${#fields.hasErrors('*')}" class="alert-error">
                Corrija los errores indicados.
            </div>
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" th:field="*{nombre}" required />
                <span th:if="${#fields.hasErrors('nombre')}" class="error-msg"
                      th:errors="*{nombre}"></span>
            </div>
            <div class="form-group">
                <label for="email">Correo:</label>
                <input type="email" id="email" th:field="*{email}" required />
                <span th:if="${#fields.hasErrors('email')}" class="error-msg"
                      th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label for="contrasenia">Contraseña:</label>
                <input type="password" id="contrasenia" th:field="*{contrasenia}" required />
                <span th:if="${#fields.hasErrors('contrasenia')}" class="error-msg"
                      th:errors="*{contrasenia}"></span>
            </div>
            <button type="submit" class="btn btn-primary">Registrarse</button>
        </form>
        <a th:href="@{/login}" class="link">Ya tiene cuenta? Iniciar Sesion</a>
    </div>
</body>
</html>
