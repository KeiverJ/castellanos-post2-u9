<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Inscribir Estudiante</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 1rem;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 8px 12px;
        text-align: left;
      }
      th {
        background: #065a82;
        color: white;
      }
      .btn {
        padding: 6px 12px;
        text-decoration: none;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        color: white;
      }
      .btn-add {
        background: #2e7d32;
      }
      .btn-remove {
        background: #c62828;
      }
      .btn-back {
        background: #808080;
        display: inline-block;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Inscribir Estudiante en: <span th:text="${curso.nombre}"></span></h1>
    <a th:href="@{/cursos}" class="btn btn-back">Volver a cursos</a>

    <h2>Estudiantes disponibles para inscribir</h2>
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Carrera</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="e : ${estudiantes}">
          <td th:text="${e.nombre}"></td>
          <td th:text="${e.apellido}"></td>
          <td th:text="${e.carrera}"></td>
          <td>
            <form
              th:action="@{/cursos/{cid}/inscribir/{eid}(cid=${curso.id},eid=${e.id})}"
              method="post"
              style="display: inline"
            >
              <button type="submit" class="btn btn-add">+ Inscribir</button>
            </form>
            <form
              th:action="@{/cursos/{cid}/desinscribir/{eid}(cid=${curso.id},eid=${e.id})}"
              method="post"
              style="display: inline"
            >
              <button type="submit" class="btn btn-remove">
                - Desinscribir
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <h2>Estudiantes actualmente inscritos</h2>
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Correo</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="e : ${curso.estudiantes}">
          <td th:text="${e.nombre}"></td>
          <td th:text="${e.apellido}"></td>
          <td th:text="${e.correo}"></td>
        </tr>
        <tr th:if="${#sets.isEmpty(curso.estudiantes)}">
          <td colspan="3" style="text-align: center">
            No hay estudiantes inscritos.
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
