<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Nuevo Curso</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
      }
      div {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
      }
      input {
        width: 300px;
        padding: 8px;
        box-sizing: border-box;
      }
      span.error {
        color: #c62828;
        font-size: 0.85rem;
      }
      .btn-save {
        padding: 8px 16px;
        background: #065a82;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-cancel {
        padding: 8px 16px;
        background: #808080;
        color: white;
        text-decoration: none;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Nuevo Curso</h1>
    <form th:action="@{/cursos/guardar}" th:object="${curso}" method="post">
      <div>
        <label>Nombre del Curso:</label>
        <input type="text" th:field="*{nombre}" />
        <span
          class="error"
          th:if="${#fields.hasErrors('nombre')}"
          th:errors="*{nombre}"
        ></span>
      </div>
      <div>
        <label>Créditos:</label>
        <input type="number" th:field="*{creditos}" min="1" max="10" />
      </div>
      <button type="submit" class="btn-save">Guardar Curso</button>
      <a th:href="@{/cursos}" class="btn-cancel">Cancelar</a>
    </form>
  </body>
</html>
