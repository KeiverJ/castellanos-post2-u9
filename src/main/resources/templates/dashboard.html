<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }
        .btn {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-block;
        }
        .btn-admin {
            background: #2e7d32;
            color: white;
        }
        .btn-logout {
            background: #c62828;
            color: white;
        }
        .role-info {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <h1>Dashboard</h1>
    <p>Bienvenido, <strong sec:authentication="name"></strong></p>
    <p>Nombre: <span th:text="${usuario.nombre}"></span></p>

    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="btn btn-admin">
        Panel de Administracion
    </a>

    <div class="role-info">
        <p sec:authorize="hasRole('USER')">
            Acceso de usuario estandar.
        </p>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-logout">Cerrar Sesion</button>
    </form>
</body>
</html>
